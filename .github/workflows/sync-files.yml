name: Sync Files to All Repos

# ─────────────────────────────────────────────────────────────────────────────
# Runs every time you push to central-workflows (main branch).
# Automatically copies all configs + the PR review workflow to every client
# repo listed in .github/sync.yml.
# ─────────────────────────────────────────────────────────────────────────────

on:
  push:
    branches:
      - main
  workflow_dispatch:   # allows manual trigger from GitHub UI

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout central repo
        uses: actions/checkout@v4

      - name: Sync files to all client repos
        uses: BetaHuhn/repo-file-sync-action@v1
        with:
          GH_PAT: ${{ secrets.GH_PAT }}
          CONFIG_PATH: .github/sync.yml
          PR_LABELS: false          # push directly, no PR needed
          COMMIT_EACH_FILE: false
          SKIP_PR: true             # commit directly to main on client repos